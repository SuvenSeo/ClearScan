name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Free policy check
        shell: pwsh
        run: ./scripts/check-free-policy.ps1

      - name: Version sync check
        shell: pwsh
        run: ./scripts/check-version-sync.ps1

      - name: OCR corpus and tessdata check
        shell: pwsh
        run: ./scripts/check-ocr-corpus.ps1

      - name: Privacy release gate
        shell: pwsh
        run: ./scripts/privacy-release-gate.ps1

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --stacktrace
